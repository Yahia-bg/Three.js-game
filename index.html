<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEADZONE</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #c0392b;
      --red-dark: #7b241c;
      --red-glow: rgba(192, 57, 43, 0.6);
      --off-white: #e8e0d0;
      --muted: #9a8f82;
      --bg: #0a0a0a;
      --ui-luminosity: 1.18;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      color: var(--off-white);
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
    }

    #scanlines {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.045) 3px,
        rgba(0,0,0,0.045) 4px
      );
      pointer-events: none;
      animation: flicker 8s infinite;
    }

    @keyframes flicker {
      0%, 97%, 100% { opacity: 1; }
      98% { opacity: 0.7; }
      99% { opacity: 1; }
      99.5% { opacity: 0.5; }
    }

    #ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }

    .title-wrap {
      text-align: center;
      margin-bottom: 3rem;
      animation: titleIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .subtitle-tag {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      animation: blink 3s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .game-title {
      font-family: 'Creepster', cursive;
      font-size: clamp(5rem, 14vw, 11rem);
      line-height: 0.9;
      color: var(--off-white);
      text-shadow:
        0 0 20px var(--red-glow),
        0 0 60px var(--red-glow),
        3px 3px 0 var(--red-dark);
      letter-spacing: 0.05em;
      position: relative;
    }

    .game-title span { color: var(--red); }

    .tagline {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      margin-top: 0.75rem;
      text-transform: uppercase;
    }

    @keyframes titleIn {
      from { opacity: 0; transform: translateY(-30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 340px;
    }

    .menu-btn {
      width: 100%;
      padding: 0.85rem 2rem;
      background: transparent;
      border: 1px solid rgba(192, 57, 43, 0.5);
      color: var(--off-white);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, color 0.2s;
      outline: none;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }

    .menu-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--red);
      transform: translateX(-105%);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: -1;
    }

    .menu-btn:hover { color: #fff; border-color: var(--red); }
    .menu-btn:hover::before { transform: translateX(0); }
    .menu-btn:active { transform: scale(0.98); }

    .menu-btn.primary {
      border-color: var(--red);
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      padding: 1rem 2rem;
    }

    .menu-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .coming-soon-label {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: var(--red);
      display: block;
      margin-top: 2px;
    }

    /* VR button styling */
    #vr-btn-wrap {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: none;
    }

    #vr-btn-wrap.visible { display: block; }

    #btn-enter-vr {
      padding: 0.75rem 2rem;
      background: transparent;
      border: 1px solid rgba(192, 57, 43, 0.8);
      color: var(--off-white);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: background 0.2s, color 0.2s;
    }

    #btn-enter-vr:hover { background: var(--red); color: #fff; }

    /* HUD (visible during game) */
    #hud {
      position: fixed;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      display: none;
    }

    #hud.active { display: block; }

    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
    }

    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(192,57,43,0.7);
    }

    #crosshair::before { width: 2px; height: 100%; top: 0; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }

    #coords {
      position: absolute;
      bottom: 1.5rem;
      left: 1.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: rgba(255,120,100,0.78);
    }

    #escape-hint {
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      color: rgba(154,143,130,0.4);
      text-transform: uppercase;
      pointer-events: all;
      cursor: pointer;
    }

    /* Settings Modal */
    #settings-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    #settings-modal.open { opacity: 1; pointer-events: all; }

    .modal-box {
      background: #111;
      border: 1px solid rgba(192, 57, 43, 0.4);
      padding: 2rem 2.5rem;
      width: min(420px, 90vw);
      position: relative;
      transform: translateY(20px);
      transition: transform 0.25s;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    }

    #settings-modal.open .modal-box { transform: translateY(0); }

    .modal-title {
      font-family: 'Creepster', cursive;
      font-size: 2rem;
      color: var(--red);
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .setting-label {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .setting-value { font-size: 0.85rem; color: var(--off-white); }

    input[type="range"] {
      -webkit-appearance: none;
      width: 120px;
      height: 3px;
      background: rgba(192,57,43,0.3);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: var(--red);
      cursor: pointer;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }

    .toggle {
      width: 40px; height: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(192,57,43,0.4);
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }

    .toggle.on { background: var(--red-dark); }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      background: var(--muted);
      transition: transform 0.2s, background 0.2s;
    }

    .toggle.on::after { transform: translateX(20px); background: var(--off-white); }

    .modal-close { margin-top: 1.5rem; width: 100%; }

    .blood-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      z-index: 3;
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      pointer-events: none;
    }

    .drip {
      width: 6px;
      background: var(--red-dark);
      border-radius: 0 0 4px 4px;
      animation: drip-fall linear infinite;
      opacity: 0.7;
    }

    @keyframes drip-fall {
      0%   { height: 0; opacity: 0.8; }
      60%  { height: var(--drip-h); opacity: 0.8; }
      100% { height: var(--drip-h); opacity: 0; }
    }

    .menu .menu-btn {
      opacity: 0;
      animation: menuIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .menu .menu-btn:nth-child(1) { animation-delay: 0.6s; }
    .menu .menu-btn:nth-child(2) { animation-delay: 0.75s; }
    .menu .menu-btn:nth-child(3) { animation-delay: 0.9s; }

    @keyframes menuIn {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .version {
      position: fixed;
      bottom: 1rem;
      right: 1.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(154,143,130,0.4);
      z-index: 10;
    }

    /* Mobile move pad */
    #move-pad {
      position: fixed;
      bottom: 3rem;
      left: 2rem;
      z-index: 20;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: all;
    }

    #move-pad.active { display: flex; }
    #move-pad-row { display: flex; gap: 4px; }

    .pad-btn {
      width: 48px; height: 48px;
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.4);
      color: var(--off-white);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .pad-btn:active { background: rgba(192,57,43,0.5); }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="vignette"></div>
<div id="scanlines"></div>
<div class="blood-top" id="drips"></div>

<!-- Main Menu -->
<div id="ui">
  <div class="title-wrap">
    <div class="subtitle-tag">&#9632; survival horror &#9632;</div>
    <h1 class="game-title">DEAD<span>ZONE</span></h1>
    <p class="tagline">nowhere left to run</p>
  </div>
  <nav class="menu">
    <button class="menu-btn primary" id="btn-play">&#9654; &nbsp; Play</button>
    <button class="menu-btn" id="btn-settings">&#9881; &nbsp; Settings</button>
    <button class="menu-btn disabled">
      &#128257; &nbsp; Multiplayer
      <span class="coming-soon-label">&#9632; coming soon &#9632;</span>
    </button>
  </nav>
</div>

<!-- In-game HUD -->
<div id="hud">
  <div id="crosshair"></div>
  <div id="coords">SECTOR 0,0</div>
  <div id="escape-hint" id="btn-back-menu">&#9632; ESC — MENU</div>
</div>

<!-- VR Enter Button -->
<div id="vr-btn-wrap">
  <button id="btn-enter-vr">&#128097; Enter VR</button>
</div>

<!-- Mobile D-pad -->
<div id="move-pad">
  <button class="pad-btn" id="pad-fwd">▲</button>
  <div id="move-pad-row">
    <button class="pad-btn" id="pad-left">◀</button>
    <button class="pad-btn" id="pad-back">▼</button>
    <button class="pad-btn" id="pad-right">▶</button>
  </div>
</div>

<div class="version">v0.2.0-alpha · VR</div>

<!-- Settings modal -->
<div id="settings-modal">
  <div class="modal-box">
    <div class="modal-title">Settings</div>
    <div class="setting-row">
      <span class="setting-label">Master Volume</span>
      <div style="display:flex;align-items:center;gap:10px">
        <input type="range" min="0" max="100" value="80" id="vol-master" />
        <span class="setting-value" id="vol-master-val">80</span>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">SFX Volume</span>
      <div style="display:flex;align-items:center;gap:10px">
        <input type="range" min="0" max="100" value="70" id="vol-sfx" />
        <span class="setting-value" id="vol-sfx-val">70</span>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Fullscreen</span>
      <div class="toggle on" id="toggle-fullscreen"></div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Gore Effects</span>
      <div class="toggle on" id="toggle-gore"></div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Motion Blur</span>
      <div class="toggle" id="toggle-blur"></div>
    </div>
    <div class="setting-row">
      <span class="setting-label">VR Comfort Mode</span>
      <div class="toggle on" id="toggle-vr-comfort"></div>
    </div>
    <button class="menu-btn modal-close" id="btn-close-settings">Close</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0a0a0a);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.BasicShadowMap;

// Global luminosity / exposure
let luminosity = 2.1;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.LinearToneMapping;
renderer.toneMappingExposure = luminosity;

// Enable WebXR
renderer.xr = renderer.xr || {};

// We'll check for native XR support
let vrSupported = false;
let vrSession = null;
let xrReferenceSpace = null;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0a, 0.05);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 60);

// Player rig: yaw object holds camera for mouse look
const playerRig = new THREE.Object3D();
playerRig.position.set(1.5, 0, 1.5); // start at maze cell centre
scene.add(playerRig);
playerRig.add(camera);
camera.position.set(0, 1.65, 0);

// ═══════════════════════════════════════════════════════════════════
//  MENU SCENE (background)
// ═══════════════════════════════════════════════════════════════════
const menuScene = new THREE.Scene();
menuScene.fog = new THREE.FogExp2(0x0a0a0a, 0.045);
const menuCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
menuCamera.position.set(0, 1.6, 0);

// Ground
const groundGeo = new THREE.PlaneGeometry(80, 80, 40, 40);
const groundMat = new THREE.MeshBasicMaterial({ color: 0x0d0d0d, wireframe: true, opacity: 0.3, transparent: true });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
menuScene.add(ground);

// Particles
const PARTICLE_COUNT = 600;
const positions = new Float32Array(PARTICLE_COUNT * 3);
const velocities = [];
for (let i = 0; i < PARTICLE_COUNT; i++) {
  positions[i*3]   = (Math.random()-0.5)*40;
  positions[i*3+1] = Math.random()*20-2;
  positions[i*3+2] = (Math.random()-0.5)*40;
  velocities.push({ x:(Math.random()-0.5)*0.01, y:-(0.005+Math.random()*0.015), z:(Math.random()-0.5)*0.005 });
}
const partGeo = new THREE.BufferGeometry();
partGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const partMat = new THREE.PointsMaterial({ color: 0x555555, size: 0.08, transparent: true, opacity: 0.6 });
const particles = new THREE.Points(partGeo, partMat);
menuScene.add(particles);

const menuLights = [];
for (let i = 0; i < 4; i++) {
  const light = new THREE.PointLight(0xc0392b, 1.5, 12);
  light.position.set((Math.random()-0.5)*20, 0.5+Math.random()*2, -5-Math.random()*15);
  menuScene.add(light);
  menuLights.push({ light, baseX: light.position.x, baseZ: light.position.z, t: Math.random()*Math.PI*2 });
}

const buildingMat = new THREE.MeshBasicMaterial({ color: 0x080808 });
[[-18,3,-30],[-10,5,-35],[-4,7,-32],[4,4,-33],[12,6,-30],[20,3,-28]].forEach(([x,h,z]) => {
  const w = 3+Math.random()*4;
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,2), buildingMat);
  mesh.position.set(x, h/2-0.5, z);
  menuScene.add(mesh);
  for (let i = 0; i < Math.floor(Math.random()*4)+1; i++) {
    const wmat = new THREE.MeshBasicMaterial({ color: 0xc0392b, opacity: 0.4+Math.random()*0.4, transparent: true });
    const win = new THREE.Mesh(new THREE.PlaneGeometry(0.3,0.3), wmat);
    win.position.set(x+(Math.random()-0.5)*w*0.7, Math.random()*h*0.7, z+1.1);
    menuScene.add(win);
  }
});

// ═══════════════════════════════════════════════════════════════════
//  MAZE GENERATION (Recursive Backtracker per chunk)
// ═══════════════════════════════════════════════════════════════════
const CELL = 3;        // world-units per maze cell
const CHUNK_CELLS = 8; // cells per chunk side
const CHUNK_SIZE = CELL * CHUNK_CELLS;
const RENDER_CHUNKS = 3; // chunks visible in each direction

const wallMat  = new THREE.MeshLambertMaterial({ color: 0x352020 });
const floorMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
const ceilMat  = new THREE.MeshLambertMaterial({ color: 0x121212 });

const WALL_H = 3.2;
const WALL_T = 0.25;

const loadedChunks = new Map(); // key: "cx,cz"

// Seeded RNG so same chunk always generates same maze
function seededRNG(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 4294967296;
  };
}

function generateMaze(rng) {
  // Grid: 0=unvisited, walls tracked as booleans
  const N = CHUNK_CELLS;
  const visited = Array.from({length: N}, () => new Array(N).fill(false));
  // walls[r][c] = { right: bool, bottom: bool }
  const walls = Array.from({length: N}, () =>
    Array.from({length: N}, () => ({ right: true, bottom: true }))
  );

  const stack = [];
  const startR = 0, startC = 0;
  visited[startR][startC] = true;
  stack.push([startR, startC]);

  const dirs = [[0,1,'right'],[0,-1,'left'],[1,0,'bottom'],[-1,0,'top']];

  while (stack.length > 0) {
    const [r, c] = stack[stack.length - 1];
    // Shuffle directions
    const shuffled = dirs.slice().sort(() => rng() - 0.5);
    let moved = false;
    for (const [dr, dc, dir] of shuffled) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < N && nc >= 0 && nc < N && !visited[nr][nc]) {
        // Remove wall between (r,c) and (nr,nc)
        if (dir === 'right')  walls[r][c].right  = false;
        if (dir === 'left')   walls[nr][nc].right = false;
        if (dir === 'bottom') walls[r][c].bottom  = false;
        if (dir === 'top')    walls[nr][nc].bottom = false;
        visited[nr][nc] = true;
        stack.push([nr, nc]);
        moved = true;
        break;
      }
    }
    if (!moved) stack.pop();
  }
  return walls;
}

function buildChunkMesh(cx, cz) {
  const key = `${cx},${cz}`;
  if (loadedChunks.has(key)) return;

  const seed = ((cx * 73856093) ^ (cz * 19349663)) >>> 0;
  const rng = seededRNG(seed);
  const walls = generateMaze(rng);

  const group = new THREE.Group();
  const N = CHUNK_CELLS;
  const ox = cx * CHUNK_SIZE;
  const oz = cz * CHUNK_SIZE;

  // Floor
  const floorMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE),
    floorMat
  );
  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.position.set(ox + CHUNK_SIZE/2, 0, oz + CHUNK_SIZE/2);
  group.add(floorMesh);

  // Ceiling
  const ceilMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE),
    ceilMat
  );
  ceilMesh.rotation.x = Math.PI / 2;
  ceilMesh.position.set(ox + CHUNK_SIZE/2, WALL_H, oz + CHUNK_SIZE/2);
  group.add(ceilMesh);

  // Helper: add wall segment
  function addWall(wx, wz, len, rotY) {
    const geo = new THREE.BoxGeometry(
      rotY === 0 ? WALL_T : len,
      WALL_H,
      rotY === 0 ? len : WALL_T
    );
    const m = new THREE.Mesh(geo, wallMat);
    m.position.set(wx, WALL_H/2, wz);
    group.add(m);
  }

  // Outer border walls
  addWall(ox,            WALL_H/2, CHUNK_SIZE, 0); // left border (z-axis)
  // We'll generate per-cell walls instead and let chunk adjacency handle gaps

  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      const wx = ox + c * CELL;
      const wz = oz + r * CELL;

      // North wall of every first row cell (chunk border)
      if (r === 0) {
        addWall(wx + CELL/2, wz, CELL, 1);
      }
      // West wall of every first col cell (chunk border)
      if (c === 0) {
        addWall(wx, wz + CELL/2, CELL, 0);
      }

      // Right wall (east)
      if (walls[r][c].right) {
        addWall(wx + CELL, wz + CELL/2, CELL, 0);
      }

      // Bottom wall (south)
      if (walls[r][c].bottom) {
        addWall(wx + CELL/2, wz + CELL, CELL, 1);
      }
    }
  }

  // Occasional red emergency light
  const lightCount = Math.floor(rng() * 3) + 1;
  for (let i = 0; i < lightCount; i++) {
    const lr = Math.floor(rng() * N);
    const lc = Math.floor(rng() * N);
    const light = new THREE.PointLight(0xff6a55, 2.8, 14);
    light.position.set(ox + lc*CELL + CELL/2, WALL_H - 0.3, oz + lr*CELL + CELL/2);
    group.add(light);

    // Light fixture geometry
    const fixture = new THREE.Mesh(
      new THREE.BoxGeometry(0.15, 0.1, 0.15),
      new THREE.MeshBasicMaterial({ color: 0xff7a66 })
    );
    fixture.position.copy(light.position);
    group.add(fixture);
  }

  scene.add(group);
  loadedChunks.set(key, group);
}

function removeChunk(cx, cz) {
  const key = `${cx},${cz}`;
  const group = loadedChunks.get(key);
  if (!group) return;
  scene.remove(group);
  group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
  });
  loadedChunks.delete(key);
}

function updateChunks() {
  const px = playerRig.position.x;
  const pz = playerRig.position.z;
  const pcx = Math.floor(px / CHUNK_SIZE);
  const pcz = Math.floor(pz / CHUNK_SIZE);

  // Load needed chunks
  for (let dx = -RENDER_CHUNKS; dx <= RENDER_CHUNKS; dx++) {
    for (let dz = -RENDER_CHUNKS; dz <= RENDER_CHUNKS; dz++) {
      buildChunkMesh(pcx + dx, pcz + dz);
    }
  }

  // Unload far chunks
  for (const [key, _] of loadedChunks) {
    const [cx, cz] = key.split(',').map(Number);
    if (Math.abs(cx - pcx) > RENDER_CHUNKS + 1 || Math.abs(cz - pcz) > RENDER_CHUNKS + 1) {
      removeChunk(cx, cz);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
//  COLLISION DETECTION (simple AABB against walls)
// ═══════════════════════════════════════════════════════════════════
function getWallsNear(px, pz, radius) {
  // Returns AABB boxes of wall meshes nearby
  const boxes = [];
  loadedChunks.forEach(group => {
    group.children.forEach(obj => {
      if (obj.isMesh && obj.material === wallMat) {
        const box = new THREE.Box3().setFromObject(obj);
        const center = new THREE.Vector3();
        box.getCenter(center);
        if (Math.abs(center.x - px) < radius && Math.abs(center.z - pz) < radius) {
          boxes.push(box);
        }
      }
    });
  });
  return boxes;
}

function resolveCollision(newPos) {
  const PR = 0.35; // player radius
  const boxes = getWallsNear(newPos.x, newPos.z, 6);
  for (const box of boxes) {
    // Expand box by player radius
    const expanded = box.clone();
    expanded.min.x -= PR; expanded.max.x += PR;
    expanded.min.z -= PR; expanded.max.z += PR;
    if (newPos.x > expanded.min.x && newPos.x < expanded.max.x &&
        newPos.z > expanded.min.z && newPos.z < expanded.max.z) {
      // Push out on shortest axis
      const ox1 = expanded.max.x - newPos.x;
      const ox2 = newPos.x - expanded.min.x;
      const oz1 = expanded.max.z - newPos.z;
      const oz2 = newPos.z - expanded.min.z;
      const minO = Math.min(ox1, ox2, oz1, oz2);
      if (minO === ox1) newPos.x = expanded.max.x;
      else if (minO === ox2) newPos.x = expanded.min.x;
      else if (minO === oz1) newPos.z = expanded.max.z;
      else newPos.z = expanded.min.z;
    }
  }
  return newPos;
}

// ═══════════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════════
const keys = {};
let isLocked = false;
let yaw = 0, pitch = 0;
let gameActive = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Escape' && gameActive) exitGame();
});
document.addEventListener('keyup',  e => { keys[e.code] = false; });

// Pointer lock for desktop
canvas.addEventListener('click', () => {
  if (gameActive && !isLocked) canvas.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === canvas;
});

document.addEventListener('mousemove', e => {
  if (!isLocked || !gameActive) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch  = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
});

// Mobile d-pad
const padState = { fwd:false, back:false, left:false, right:false };
function bindPad(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); padState[key] = true; }, { passive: false });
  el.addEventListener('touchend',   e => { e.preventDefault(); padState[key] = false; }, { passive: false });
  el.addEventListener('mousedown',  () => padState[key] = true);
  el.addEventListener('mouseup',    () => padState[key] = false);
}
bindPad('pad-fwd',   'fwd');
bindPad('pad-back',  'back');
bindPad('pad-left',  'left');
bindPad('pad-right', 'right');

// Touch look (right half of screen)
let touchLookId = null, touchLookLast = null;
canvas.addEventListener('touchstart', e => {
  for (const t of e.changedTouches) {
    if (t.clientX > window.innerWidth * 0.5 && touchLookId === null) {
      touchLookId = t.identifier;
      touchLookLast = { x: t.clientX, y: t.clientY };
    }
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchLookId && touchLookLast) {
      const dx = t.clientX - touchLookLast.x;
      const dy = t.clientY - touchLookLast.y;
      yaw   -= dx * 0.004;
      pitch -= dy * 0.004;
      pitch  = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
      touchLookLast = { x: t.clientX, y: t.clientY };
    }
  }
}, { passive: true });

canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchLookId) { touchLookId = null; touchLookLast = null; }
  }
}, { passive: true });

// ═══════════════════════════════════════════════════════════════════
//  PLAYER MOVEMENT
// ═══════════════════════════════════════════════════════════════════
const SPEED = 4.5; // units/sec

function updatePlayer(dt) {
  if (!gameActive) return;

  // Apply yaw to rig, pitch to camera
  playerRig.rotation.y = yaw;
  camera.rotation.x = pitch;

  // Movement
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right   = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));

  let move = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp']    || padState.fwd)   move.addScaledVector(forward,  1);
  if (keys['KeyS'] || keys['ArrowDown']  || padState.back)  move.addScaledVector(forward, -1);
  if (keys['KeyA'] || keys['ArrowLeft']  || padState.left)  move.addScaledVector(right,   -1);
  if (keys['KeyD'] || keys['ArrowRight'] || padState.right) move.addScaledVector(right,    1);

  if (move.lengthSq() > 0) {
    move.normalize().multiplyScalar(SPEED * dt);
    const newPos = playerRig.position.clone().add(move);
    newPos.y = 0; // keep on ground
    const resolved = resolveCollision(newPos);
    playerRig.position.x = resolved.x;
    playerRig.position.z = resolved.z;
  }

  // Update HUD coords
  const cx = Math.floor(playerRig.position.x / CHUNK_SIZE);
  const cz = Math.floor(playerRig.position.z / CHUNK_SIZE);
  document.getElementById('coords').textContent =
    `SECTOR ${cx},${cz}  //  ${playerRig.position.x.toFixed(1)}, ${playerRig.position.z.toFixed(1)}`;
}

function setLuminosity(value) {
  luminosity = value;
  renderer.toneMappingExposure = luminosity;
}

// ═══════════════════════════════════════════════════════════════════
//  VR SUPPORT (WebXR)
// ═══════════════════════════════════════════════════════════════════
let xrControllers = [];
let vrComfortMode = true;

// Check WebXR availability
async function checkVRSupport() {
  if (navigator.xr) {
    try {
      const supported = await navigator.xr.isSessionSupported('immersive-vr');
      if (supported) {
        vrSupported = true;
        document.getElementById('vr-btn-wrap').classList.add('visible');
        renderer.xr.enabled = true;
      }
    } catch(e) {
      console.log('XR check failed:', e);
    }
  }
}

async function enterVR() {
  if (!vrSupported) return;
  try {
    vrSession = await navigator.xr.requestSession('immersive-vr', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['bounded-floor', 'hand-tracking']
    });

    renderer.xr.setSession(vrSession);
    xrReferenceSpace = await vrSession.requestReferenceSpace('local-floor');

    vrSession.addEventListener('end', () => {
      vrSession = null;
      renderer.xr.enabled = true; // keep enabled for next entry
    });

    // Set up VR controllers
    for (let i = 0; i < 2; i++) {
      const controller = renderer.xr.getController(i);
      controller.addEventListener('selectstart', onVRSelectStart.bind(null, i));
      controller.addEventListener('selectend',   onVRSelectEnd.bind(null, i));
      playerRig.add(controller);
      xrControllers[i] = controller;

      // Controller visual
      const cGeo = new THREE.CylinderGeometry(0.015, 0.025, 0.12, 8);
      const cMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
      const cMesh = new THREE.Mesh(cGeo, cMat);
      cMesh.rotation.x = -Math.PI / 4;
      controller.add(cMesh);

      // Ray pointer
      const rayGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 0, -3)
      ]);
      const rayMat = new THREE.LineBasicMaterial({ color: 0xc0392b, opacity: 0.4, transparent: true });
      controller.add(new THREE.Line(rayGeo, rayMat));
    }

  } catch(e) {
    console.error('VR session error:', e);
  }
}

const vrMoveState = [false, false];
function onVRSelectStart(i) { vrMoveState[i] = true; }
function onVRSelectEnd(i)   { vrMoveState[i] = false; }

// VR locomotion: left trigger = walk forward in head direction
function updateVRMovement(dt) {
  if (!renderer.xr || !renderer.xr.isPresenting) return;

  const cam = renderer.xr.getCamera(camera);
  if (!cam) return;

  // Left controller trigger: move forward
  if (vrMoveState[0]) {
    const dir = new THREE.Vector3();
    cam.getWorldDirection(dir);
    dir.y = 0;
    dir.normalize().multiplyScalar(SPEED * dt);
    const newPos = playerRig.position.clone().add(dir);
    const resolved = resolveCollision(newPos);
    playerRig.position.x = resolved.x;
    playerRig.position.z = resolved.z;
  }

  // Right controller trigger: teleport forward 2 cells (comfort mode)
  // Handled via selectend for snap
}

// Snap turn on right thumbstick (comfort) - handled via gamepad polling
let snapCooldown = 0;
function pollVRGamepad(dt) {
  if (!renderer.xr || !renderer.xr.isPresenting) return;
  snapCooldown = Math.max(0, snapCooldown - dt);

  const session = renderer.xr.getSession ? renderer.xr.getSession() : null;
  const sources = session ? Array.from(session.inputSources || []) : [];

  for (const src of sources) {
    if (!src.gamepad) continue;
    const axes = src.gamepad.axes;
    if (src.handedness === 'right' && axes.length >= 4) {
      const ax = axes[2]; // thumbstick X
      if (Math.abs(ax) > 0.6 && snapCooldown <= 0) {
        yaw -= Math.sign(ax) * (Math.PI / 4); // 45° snap
        playerRig.rotation.y = yaw;
        snapCooldown = 0.35;
      }
    }
    // Left thumbstick smooth move
    if (src.handedness === 'left' && axes.length >= 4) {
      const ax = axes[2], az = axes[3];
      if (Math.abs(ax) > 0.2 || Math.abs(az) > 0.2) {
        const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
        const right   = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));
        let move = new THREE.Vector3();
        move.addScaledVector(forward, -az * 0.8);
        move.addScaledVector(right,    ax * 0.8);
        if (move.lengthSq() > 0) {
          move.normalize().multiplyScalar(SPEED * dt);
          const newPos = playerRig.position.clone().add(move);
          const resolved = resolveCollision(newPos);
          playerRig.position.x = resolved.x;
          playerRig.position.z = resolved.z;
        }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════════════════════════
function startGame() {
  gameActive = true;
  document.getElementById('ui').style.display = 'none';
  document.getElementById('scanlines').style.display = 'none';
  document.getElementById('hud').classList.add('active');
  document.getElementById('vr-btn-wrap').style.bottom = '2rem';

  // Show mobile controls on touch devices
  if ('ontouchstart' in window) {
    document.getElementById('move-pad').classList.add('active');
  }

  // Initial chunk load
  playerRig.position.set(CELL * 0.5, 0, CELL * 0.5);
  updateChunks();

  // Ambient rumble light
  const ambLight = new THREE.AmbientLight(0x8a4b42, 1.6);
  scene.add(ambLight);
}

function exitGame() {
  gameActive = false;
  document.exitPointerLock();
  if (vrSession) { vrSession.end(); }
  document.getElementById('ui').style.display = 'flex';
  document.getElementById('ui').style.opacity = '1';
  document.getElementById('scanlines').style.display = 'block';
  document.getElementById('hud').classList.remove('active');
  document.getElementById('move-pad').classList.remove('active');
}

// ═══════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════════
let lastTime = 0;
let menuMouseX = 0, menuMouseY = 0;
document.addEventListener('mousemove', e => {
  if (gameActive) return;
  menuMouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  menuMouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});
document.addEventListener('touchmove', e => {
  if (gameActive) return;
  const t = e.touches[0];
  menuMouseX = (t.clientX / window.innerWidth - 0.5) * 2;
  menuMouseY = (t.clientY / window.innerHeight - 0.5) * 2;
}, { passive: true });

let menuClock = 0;

function animate(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  menuClock += dt;

  if (!gameActive) {
    // Menu animation
    menuCamera.position.x += (menuMouseX * 1.5 - menuCamera.position.x) * 0.04;
    menuCamera.position.y += (1.6 - menuMouseY * 0.5 - menuCamera.position.y) * 0.04;
    menuCamera.lookAt(menuCamera.position.x * 0.2, menuCamera.position.y * 0.2, -10);

    const pos = partGeo.attributes.position.array;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      pos[i*3]   += velocities[i].x;
      pos[i*3+1] += velocities[i].y;
      pos[i*3+2] += velocities[i].z;
      if (pos[i*3+1] < -1) {
        pos[i*3+1] = 18;
        pos[i*3]   = (Math.random()-0.5)*40;
        pos[i*3+2] = (Math.random()-0.5)*40;
      }
    }
    partGeo.attributes.position.needsUpdate = true;

    menuLights.forEach((lObj, i) => {
      menuLights[i].t += 0.04 + i * 0.01;
      lObj.light.intensity = 1.0 + Math.sin(lObj.t*7)*0.5 + Math.sin(lObj.t*13)*0.3;
    });

    renderer.render(menuScene, menuCamera);

  } else {
    // Game
    updatePlayer(dt);
    updateVRMovement(dt);
    pollVRGamepad(dt);
    updateChunks();

    // Flicker in-maze lights every frame
    scene.traverse(obj => {
      if (obj.isPointLight) {
        obj.intensity = 2.2 + Math.sin(menuClock * (7 + obj.position.x)) * 0.6
                            + Math.sin(menuClock * (13 + obj.position.z)) * 0.35;
      }
    });

    if (renderer.xr && renderer.xr.isPresenting) {
      renderer.render(scene, camera); // XR handles stereo internally
    } else {
      renderer.render(scene, camera);
    }
  }
}

// Use XR-aware animation loop
renderer.setAnimationLoop(animate);
